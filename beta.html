<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>You Buddy 2026 단어 테스트 (Beta)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css?v=20260327-beta1" />
</head>
<body>
  <div class="card" id="card">

    <div class="top-row">
      <div class="left-header">
        <div class="members-tag">*members only</div>

        <a
          href="https://apple-libra-6af.notion.site/30-2fe1fc05de1e807c9965db406bb35249?source=copy_link"
          target="_blank"
          class="badge-link"
        >
          <div class="badge">
            <div class="badge-avatar">YB</div>
            <div class="badge-text">
              <span>유버디 영어 루틴</span>
              <span>📎 유버디 영어 루틴</span>
            </div>
          </div>
          </a>
      </div>

      <div class="right-actions">
        <a class="beta-link" href="index.html">메인으로</a>
        <button class="mode-pill" id="resetBtn" type="button">
          <div class="mode-dot"></div>
          <span>Reset</span>
        </button>
      </div>
    </div>

    <div class="sentence-card">
      <div class="sentence-line">
        
        <div class="line-part" id="sentencePrefix"></div>

        <div class="answer-pill-wrapper">
          <span class="answer-pill">
            <span class="answer-visual-inner" id="slotsContainer"></span>
          </span>
        </div>

        <div class="line-part" id="sentenceSuffix"></div>
      </div>

      <div class="meaning" id="meaning"></div>
    </div>

    <input
      type="text"
      id="mobileInput"
      class="mobile-input"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    />


    <div class="bottom-row">
      <button class="btn" id="skipBtn">정답 보기</button>
      <button class="btn voice-btn" id="voiceBtn" type="button">
        <span class="voice-dot" aria-hidden="true"></span>
        <span class="voice-label">Voice</span>
        <span class="voice-beta">(Beta)</span>
      </button>
    </div>
    <p class="typing-hint">
      타이핑하거나 Voice 버튼을 눌러 영어로 답해 보세요
    </p>

    <div class="status" id="status"></div>
    <div class="status debug-status" id="debugStatus"></div>
    <div class="status fallback-note hidden" id="fallbackNote">
      음성 인식이 어려우면 아래 입력칸을 눌러 키보드 음성 입력을 사용해 주세요.
    </div>
    <input
      type="text"
      id="fallbackInput"
      class="fallback-input hidden"
      placeholder="여기에 말하기로 입력해 보세요"
      autocomplete="off"
    />
    <div class="meta">
      <span id="progress"></span>
      <span id="score"></span>
    </div>
  </div>

  <div id="resultModal" class="modal hidden">
    <div class="modal-content">

      <div id="modalMessage" class="modal-message"></div>

      <ul id="reviewList" class="review-list"></ul>

      <div class="modal-buttons">
        <button id="retryBtn" class="retry-btn">🔄 다시하기</button>

        <a
          href="https://apple-libra-6af.notion.site/30-2fe1fc05de1e807c9965db406bb35249?source=copy_link"
          target="_blank"
          class="notion-btn"
        >
          📘 유버디 영어 루틴
          </a>
      </div>

    </div>
  </div>

  <script src="questions.js?v=20260327-beta1"></script>
  <script src="app-beta.js?v=20260327-beta2"></script>
</body>
</html>
