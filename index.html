<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>You Buddy 2026 단어 테스트</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css?v=20260322-1" />
</head>
<body>
  <div class="card" id="card">

    <div class="top-row">
      <div class="left-header">
        <div class="members-tag">*members only</div>

        <a
          href="https://www.notion.so/4-8ef19325b9ce4f8e80948560b8823d0c?t=32b1fc05de1e8072996f00a9ea08ef5e"
          target="_blank"
          class="badge-link"
        >
          <div class="badge">
            <div class="badge-avatar">YB</div>
            <div class="badge-text">
              <span>유버디 영어 루틴</span>
              <span>🔗 페이지 보러가기</span>
            </div>
          </div>
          </a>
      </div>

      <div class="right-actions">
        <button class="mode-pill premium-pill" id="premiumBtn" type="button">
          <div class="mode-dot"></div>
          <span>Premium</span>
        </button>
        <a class="beta-link" href="beta.html">Beta 테스트</a>
        <div class="batch-selector" id="batchSelector">
          <div class="batch-options" role="group" aria-label="문제 수 선택">
            <button class="mode-pill batch-option selected" id="batch10Btn" type="button">
              <div class="mode-dot"></div>
              <span>10문제</span>
            </button>
            <button class="mode-pill batch-option" id="batch20Btn" type="button">
              <div class="mode-dot"></div>
              <span>20문제</span>
            </button>
          </div>
        </div>
        <div class="availability-pill hidden" id="availabilityPill"></div>
        <button class="mode-pill" id="resetBtn" type="button">
          <div class="mode-dot"></div>
          <span>Reset</span>
        </button>
      </div>
    </div>

    <div class="release-summary" id="releaseSummary"></div>

    <div class="sentence-card">
      <div class="sentence-line">
        
        <div class="line-part" id="sentencePrefix"></div>

        <div class="answer-pill-wrapper">
          <span class="answer-pill">
            <span class="answer-visual-inner" id="slotsContainer"></span>
          </span>
        </div>

        <div class="line-part" id="sentenceSuffix"></div>
      </div>

      <div class="meaning" id="meaning"></div>
    </div>

    <input
      type="text"
      id="mobileInput"
      class="mobile-input"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    />


    <div class="bottom-row">
      <button class="btn" id="skipBtn">정답 보기</button>
    </div>
    <p class="typing-hint">
      화면의 빈칸에 바로 타이핑하고 Enter를 눌러보세요
    </p>

    <div class="status" id="status"></div>
    <div class="meta">
      <span id="progress"></span>
      <span id="score"></span>
    </div>
    <div class="final-link-wrap" id="finalLinkWrap">
      <a class="final-link" href="https://yobuddywords2026-members.vercel.app/final.html" target="_blank" rel="noopener">Final Test 입장 (2/1 오픈)</a>
    </div>
  </div>

  <div id="resultModal" class="modal hidden">
    <div class="modal-content">

      <div id="modalMessage" class="modal-message"></div>

      <ul id="reviewList" class="review-list"></ul>

      <div class="modal-buttons">
        <button id="retryBtn" class="retry-btn">🔄 다시하기</button>

        <a 
          href="https://www.notion.so/4-8ef19325b9ce4f8e80948560b8823d0c?t=32b1fc05de1e8072996f00a9ea08ef5e"
          target="_blank"
          class="notion-btn"
        >
          📘 4기 단어장 보기
          </a>
      </div>

    </div>
  </div>

  <div id="premiumModal" class="modal hidden">
    <div class="modal-content premium-modal-content">
      <div class="premium-kicker">Premium Access</div>
      <div class="modal-message premium-modal-message">입장 코드 : ____<br />유의어까지 테스트합니다.</div>
      <label class="premium-label" for="premiumCodeInput">입장 코드</label>
      <input id="premiumCodeInput" class="premium-input" type="password" inputmode="numeric" autocomplete="one-time-code" placeholder="7777" />
      <div id="premiumHint" class="premium-hint">코드를 입력하면 프리미엄 모드가 켜집니다.</div>
      <div class="modal-buttons premium-modal-buttons">
        <button id="premiumSubmitBtn" class="retry-btn premium-submit-btn" type="button">프리미엄 시작</button>
        <button id="premiumCancelBtn" class="ghost-btn" type="button">닫기</button>
      </div>
    </div>
  </div>


  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
